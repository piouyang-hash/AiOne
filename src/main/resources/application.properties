# ==============================================
# 1. AI角色头像上传 → 单体应用统一存储
# ==============================================
ai-service.ai-role-avatar.storage.path=D:/SpringBoot/MonolithApp/ai-role-avatar
ai-service.ai-role-avatar.resource.url-prefix=/api/resources/ai-role-avatars
ai-service.ai-role-avatar.max-file-size=15MB

# ==============================================
# 2. 用户头像上传 → 单体应用统一存储
# ==============================================
user-service.user-avatar.storage.path=D:/SpringBoot/MonolithApp/user-avatar
user-service.user-avatar.resource.url-prefix=/api/resources/user-avatars
user-service.user-avatar.max-file-size=15MB

# ==============================================
# 3. 书籍封面上传 → 单体应用统一存储
# ==============================================
book-service.book-cover.storage.path=D:/SpringBoot/MonolithApp/book-cover
book-service.book-cover.resource.url-prefix=/api/resources/book-covers
book-service.book-cover.max-file-size=15MB


# ========== 新【双Token】核心配置（Access + Refresh） ==========
# 1. AccessToken 密钥（短时效令牌，核心密钥）
jwt.access-token.secret=7x9P2sR5tU8aB3gK6dF1hJ4kL0qW2eZ7cV5nM8bN
# 2. RefreshToken 密钥（长时效令牌，独立密钥，更安全）
jwt.refresh-token.secret=pS3gK9dF2hJ5kL7qW0eZ4cV6nM1bN8x9P2sR5tUaB
# 3. AccessToken 过期时间（1小时 = 3600000毫秒，短时效更安全）
jwt.access-token.expiration=3600000
# 4. RefreshToken 过期时间（7天 = 604800000毫秒，标准长时效）
jwt.refresh-token.expiration=604800000
# 5. 新增：会话级RefreshToken过期时间（30天-不记住我用，纯配置无硬编码）
jwt.refresh-token.session-expiration=2592000000

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.override-with-generic-response=false
springdoc.api-docs.version=openapi_3_0

swagger.title=User Service API
swagger.description=Provides interfaces for user registration, login, and information management
swagger.version=0.6


