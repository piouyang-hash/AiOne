spring.application.name=AiOne

# ===================== 1. MySQL 数据源核心配置 =====================
# 数据库驱动 (MySQL8.0 专用)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# 数据库连接地址 (连接你新建的 ai_chat_application_db 库)
spring.datasource.url=jdbc:mysql://localhost:3306/ai_chat_application_db?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
# 数据库账号
spring.datasource.username=root
# 数据库密码 (和你docker-compose配置一致)
spring.datasource.password=root_password

# ===================== 2. 你要求的 SQL 初始化配置 =====================
spring.sql.init.mode=always
spring.sql.init.platform=mysql
spring.sql.init.schema-locations=classpath:sql/**/*.sql

# ===================== 3. MyBatis-Plus 核心配置 =====================
# Mapper XML 文件路径 (你指定的路径)
mybatis-plus.mapper-locations=classpath*:mybatis/mapper/**/*.xml

# ===================== Redis 核心配置（匹配你的Docker容器） =====================
# Redis 服务地址（本地启动默认localhost）
spring.data.redis.host=localhost
# Redis 端口（你映射的6379）
spring.data.redis.port=6379
# Redis 密码（你设置的 123456）
spring.data.redis.password=123456

spring.ai.ollama.base-url=http://localhost:11434

# 讯飞星火的 OpenAI 兼容 base url（注意去掉 /chat/completions）
spring.ai.openai.base-url=https://spark-api-open.xf-yun.com

# api-key 格式必须去掉 Bearer 开头（你提供的已经是了）（就是API Password）
