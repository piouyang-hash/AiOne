spring.application.name=AiOne

# ===================== 1. MySQL 数据源核心配置 =====================
# 数据库驱动 (MySQL8.0 专用)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# 数据库连接地址
spring.datasource.url=jdbc:mysql://localhost:3306/ai_chat_application_db?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
# 数据库账号
spring.datasource.username=root
# 数据库密码 (请填写你的MySQL密码)
spring.datasource.password=你的MySQL数据库密码

logging.level.org.springframework.ai.chat.client.advisor=DEBUG

# ===================== 2. SQL 初始化配置 =====================
spring.sql.init.mode=always
spring.sql.init.platform=mysql
spring.sql.init.schema-locations=classpath:sql/**/*.sql

# ===================== 3. MyBatis-Plus 核心配置 =====================
mybatis-plus.mapper-locations=classpath*:mybatis/mapper/**/*.xml

# ===================== Redis 核心配置 =====================
spring.data.redis.host=localhost
spring.data.redis.port=6379
# Redis密码 (请填写你的Redis密码)
spring.data.redis.password=你的Redis密码

spring.ai.ollama.base-url=http://localhost:11434

# 讯飞星火 OpenAI 兼容配置
spring.ai.openai.base-url=https://spark-api-open.xf-yun.com/v1
# 讯飞星火 API-Key (请填写你的讯飞星火API密钥)
spring.ai.openai.api-key=你的讯飞星火API密钥

# 网络通信配置
connect.websocket.server.addr=你的服务器IP/本机IP:8094
connect.websocket.path=/ws
connect.netty.port=8094

simulate.redis.event.record.prefix=SIMULATE:EVENT_RECORD

# ==============================================
# 文件存储配置（请修改为你的本地存储路径）
# ==============================================
ai-service.ai-role-avatar.storage.path=你的本地AI角色头像存储路径
ai-service.ai-role-avatar.resource.url-prefix=/api/resources/ai-role-avatars
ai-service.ai-role-avatar.max-file-size=15MB

user-service.user-avatar.storage.path=你的本地用户头像存储路径
user-service.user-avatar.resource.url-prefix=/api/resources/user-avatars
user-service.user-avatar.max-file-size=15MB

book-service.book-cover.storage.path=你的本地书籍封面存储路径
book-service.book-cover.resource.url-prefix=/api/resources/book-covers
book-service.book-cover.max-file-size=15MB

# ========== 双Token JWT 核心配置（请填写自定义随机密钥） ==========
# AccessToken 密钥（自定义长随机字符串）
jwt.access-token.secret=你的自定义AccessToken密钥
# RefreshToken 密钥（自定义长随机字符串）
jwt.refresh-token.secret=你的自定义RefreshToken密钥
# AccessToken 过期时间（1小时）
jwt.access-token.expiration=3600000
# RefreshToken 过期时间（7天）
jwt.refresh-token.expiration=604800000
# 会话级RefreshToken过期时间（30天）
jwt.refresh-token.session-expiration=2592000000

# ===================== Swagger/Knife4j 接口文档 =====================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.override-with-generic-response=false
springdoc.api-docs.version=openapi_3_0

swagger.title=User Service API
swagger.description=Provides interfaces for user registration, login, and information management
swagger.version=0.6

## ==================== 日志配置 ====================
## 全局默认日志级别
#logging.level.root=ERROR
#logging.level.org.myfx.controls.aione.AiService.aiClient.advisor=INFO

# 验证码/管理员认证过期时间
verification.code.expire-minutes=5
admin.auth.expire-minutes=1

# 滑动窗口总结配置
sliding.window.summary.window-max-round=10
sliding.window.summary.summary-round=5

# DeepSeek 分词器路径（请填写你的本地路径）
deepseek.tokenizer.path=你的本地DeepSeekTokenizer路径

# ===================== LLM模型配置 =====================
# 总结专用模型
llm.summary.active-model=sparkChatClient
# 主对话模型
llm.main.active-model=deepseekClient

# 文件上传大小限制
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=100MB

# ===================== 邮件发送配置 =====================
spring.mail.host=smtp.qq.com
spring.mail.port=465
# 发件邮箱（请填写你的QQ邮箱）
spring.mail.username=你的QQ邮箱地址
# 邮箱授权码（请填写你的QQ邮箱SMTP授权码）
spring.mail.password=你的QQ邮箱授权码
spring.mail.protocol=smtps

# 旧版头像存储路径（兼容配置，可删除）
app.upload-dir=你的本地文件上传根路径
avatar.storage.path=你的本地旧版头像存储路径
avatar.resource.url-prefix=/api/user/resources/avatars
avatar.clean.reserve-count=3
avatar.max-count=5

# 开启虚拟线程
spring.threads.virtual.enabled=true

# ===================== 天API 配置 =====================
# 天API密钥（请填写你的TianAPI密钥）
tianapi.key=你的TianAPI密钥
tianapi.game-url=https://apis.tianapi.com/game/index
tianapi.enmaxim-url=https://apis.tianapi.com/enmaxim/index

# ===================== 支付宝沙箱配置 =====================
alipay.gateway-url=https://openapi-sandbox.dl.alipaydev.com/gateway.do
alipay.app-id=9021000163628874
# 支付宝应用私钥（PKCS8格式，填写你的应用私钥）
alipay.app-private-key=你的支付宝应用私钥
# 支付宝公钥（填写你的支付宝公钥）
alipay.alipay-public-key=你的支付宝公钥

# 固定参数
alipay.format=JSON
alipay.charset=UTF-8
alipay.sign-type=RSA2

# 支付同步跳转地址
alipay.return-url=https://www.bilibili.com/
# 支付异步通知地址（填写你的公网回调地址）
alipay.notify-url=你的支付宝异步通知地址